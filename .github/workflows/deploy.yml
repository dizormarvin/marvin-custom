name: Deploy to GCP Server

on:
  workflow_run:
    workflows: ["CI"] 
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: frappe
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # 1. Properly append the local bin directory to the execution path
            export PATH=$PATH:/home/frappe/.local/bin:/usr/local/bin
            
            echo "Navigating to app directory..."
            cd /home/frappe/frappe-bench/apps/marvin_custom
            
            echo "Fetching all branches and tags from origin..."
            git fetch --all --tags
            
            echo "Checking out and pulling the latest code..."
            # This handles pulling the branch safely as the native frappe user
            git checkout version-16 || git checkout -b version-16 origin/version-16
            git reset --hard origin/version-16
            
            echo "Moving to bench root to sync and restart..."
            cd /home/frappe/frappe-bench
            
            # 2. Running bench directly without sudo fixes the pathing mismatch
            bench clear-cache
            bench build --app marvin_custom
            bench restart
            
            echo "Deployment completed successfully!"