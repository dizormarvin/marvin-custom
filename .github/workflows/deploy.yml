name: Deploy to GCP Server

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 1. Check Python syntax and styling rules
      - name: Lint Python (Flake8)
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings (customize this line as needed)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # 2. Check JavaScript files for issues
      - name: Lint JavaScript (ESLint)
        run: |
          npm install eslint @eslint/js --save-dev
          # Runs basic syntax validation check across all JS files
          npx eslint "**/*.js" --env-info || true

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: frappe
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            export PATH=$PATH:/home/frappe/.local/bin:/usr/local/bin
            
            # Use sudo -u frappe to run commands as the frappe user
            cd /home/frappe/frappe-bench/apps/marvin_custom
            sudo -u frappe git fetch origin version-16
            sudo -u frappe git reset --hard origin/version-16
            
            cd /home/frappe/frappe-bench
            sudo -u frappe bench clear-cache
            sudo -u frappe bench build --app marvin_custom
            sudo -u frappe bench restart

