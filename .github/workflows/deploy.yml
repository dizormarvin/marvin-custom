name: Deploy to GCP Server

on:
  workflow_run:
    workflows: ["CI"] 
    types:
      - completed
    branches:
      - version-16

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: frappe
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # 1. Force the explicit pathing so sudo -u frappe knows where bench lives
            export PATH=$PATH:/home/frappe/.local/bin:/usr/local/bin
            
            echo "Navigating to app directory..."
            cd /home/frappe/frappe-bench/apps/marvin_custom
            
            echo "Fetching from upstream origin..."
            sudo -u frappe git fetch --all
            
            echo "Resetting branch safely..."
            # Using HEAD ensures it pulls down whatever tracked branch matches your current setup without ref errors
            sudo -u frappe git reset --hard origin/$(sudo -u frappe git rev-parse --abbrev-ref HEAD)
            
            echo "Moving to bench root to sync and restart..."
            cd /home/frappe/frappe-bench
            
            # Explicitly calling the full local bin path prevents the "bench: command not found" error under sudo
            sudo -u frappe /home/frappe/.local/bin/bench clear-cache
            sudo -u frappe /home/frappe/.local/bin/bench build --app marvin_custom
            sudo -u frappe /home/frappe/.local/bin/bench restart
            
            echo "Deployment completed successfully!"