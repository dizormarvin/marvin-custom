name: Deploy to GCP Server

on:
  workflow_run:
    workflows: ["CI"] 
    types:
      - completed
    branches:
      - main # Updated to trigger when CI passes on main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: frappe
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            export PATH=$PATH:/home/frappe/.local/bin:/usr/local/bin
            
            echo "Navigating to app directory..."
            cd /home/frappe/frappe-bench/apps/marvin_custom
            
            echo "Fetching all branches from origin..."
            git fetch --all
            
            echo "Checking out and pulling the latest code from main..."
            # Updated to track and pull the main branch safely
            git checkout main || git checkout -b main origin/main
            git reset --hard origin/main
            
            echo "Moving to bench root to sync and restart..."
            cd /home/frappe/frappe-bench
            
            bench clear-cache
            bench build --app marvin_custom
            bench restart
            
            echo "Deployment completed successfully!"